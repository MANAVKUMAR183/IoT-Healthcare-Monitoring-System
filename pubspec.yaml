name: smart_healthcare_app
description: AI enabled IoT based remote patient health monitoring system
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  
  # UI Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  
  # Charts & Graphs
  fl_chart: ^0.68.0
  
  # State Management
  provider: ^6.1.2
  
  # HTTP Requests
  http: ^1.2.2
  
  # Date Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  # Assets folder (create if needed)
  # assets:
  #   - assets/images/
  #   - assets/icons/